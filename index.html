<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="cookie-overlay" id="cookiePopup">
        <div class="cookie-modal">
            <h3>Aviso de Privacidad y Cookies</h3>
            <p>Este sitio web utiliza cookies para mejorar la experiencia del usuario y analizar el tráfico.</p>
            
            <div class="cookie-options">
                <label><input type="checkbox" id="c1"> Acepto la <a href="./privacidad.html" target="_blank"> política de privacidad</a></label>
                <label><input type="checkbox" id="c2"> Acepto el uso de cookies técnicas</label>
            </div>

            <div class="modal-buttons">
                <button class="btn-accept" id="btnAcceptCookie">Aceptar</button>
                <button class="btn-reject" id="btnRejectCookie">Rechazar</button>
            </div>
        </div>
    </div>

    <div class="login-card">
        <h2>Iniciar Sesión</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="Nombre de usuario" required>
            </div>
            
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="********" required>
                <span id="passError" class="error-msg">
                    Error: Mínimo 8 caracteres, una mayúscula y un símbolo (@#$...).
                </span>
            </div>

            <div class="form-checks">
                <label class="check-item">
                    <input type="checkbox" id="checkPrivacy" required> 
                    He leído y acepto la <a href="privacidad.html" target="_blank">política de privacidad</a>
                </label>
                <label class="check-item">
                    <input type="checkbox" id="checkNewsletter"> 
                    Deseo recibir información y novedades
                </label>
            </div>

            <button type="submit" class="btn-login">Acceder</button>
        </form>
    </div>

    <script src="java.js"></script>
</body>
</html>
